<!DOCTYPE html>
<html lang="es">

    <meta charset="UTF-8">

    <link rel="stylesheet" href="../css/stylePrincipal.css">
    <link rel="stylesheet" href="../css/styleForms.css">
    <title>Recuperar Contraseña | Salus CMA</title>
</head>
<body>

<header>
    <a href="../index.html">
        <img src="../img/logo.png" alt="logo" id="logo" />
    </a>
    <div class="centro">
        <nav>
            <h1>Salus CMA</h1>
            <ul>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="vision.html">Visión y Misión</a></li>
                <li><a href="personal.html">Personal</a></li>

    <div class="perfil-container">
        
        <a href="loginn.html">
            <img id="perfil" src="../img/perfil.png" alt="Perfil">
            <p>Iniciar sesión</p>
        </a>
    </div>
</header>


<main class="mainUnaColumna">
    <h2>Recuperar contraseña</h2>
    <form id="formContacto" method="POST">

        <label>Correo electrónico:</label>
        <input type="email" name="correo"
            pattern="^[a-zA-Z0-9._%+\-]+@[a-zA-Z0-9.\-]+\.[a-z]{2,}$"
            title="Ingrese un correo válido" required><br><br>

        <label id="mensajeContacto" style="color:red; display:block; margin-bottom:10px;"></label>

        <button type="button" onclick="window.location.href='loginn.html'">Cancelar</button>
        <button type="reset">Limpiar</button>
        <button type="submit">Enviar</button>

    </form>
</main>

<footer>
    <div class="footer-container">
        <div class="footer-section contact" id="footer-contacto">
            
            <h3>Contacto</h3>
            <p>Email: <a href="mailto:contacto@saluscma.com">contacto@saluscma.com</a></p>
            <p>Teléfono: <a href="tel:7821234567">782 123 4567</a></p>
            <p>Dirección: Av. Ejemplo 123, Poza Rica, Ver.</p>
        </div>
        <div class="footer-section links" id="footer-redes">
            
            <h3>Enlaces</h3>
            <a href="#"><img src="../img/facebook.png" alt="Facebook" width="30" height="30"></a>
            <a href="#"><img src="../img/instagram.png" alt="Instagram" width="30" height="30"></a>
        </div>
        <div id="footer-mapa-container">
            
        </div>
    </div>
</footer>

</body>
</html>
