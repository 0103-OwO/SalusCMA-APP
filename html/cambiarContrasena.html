        </a>

</header>


<main>
    <h2>Cambio de Contraseña</h2>

    <form id="formCambiarContrasena">

        <label>Contraseña Actual:</label>
        <input type="password" name="conActual" id="input-con-actual" required
            title="Introduce tu contraseña actual."><br><br>

        <label>Contraseña Nueva:</label>
        <input type="password" name="conNueva" id="input-con-nueva" required minlength="8"
            pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[^A-Za-z\d]).{8,}$"
            title="Debe tener al menos 8 caracteres, incluyendo una letra, un número y un carácter especial."><br><br>

        <label>Confirmación de contraseña:</label>
        <input type="password" name="conConfirmacion" id="input-con-confirmacion" required
            title="Repite la nueva contraseña."><br><br>

        <label id="mensajeCambio" style="display:block; margin-bottom:10px;"></label>

        <button type="submit">Confirmar</button>

    </form>
</main>
