            </a>
        </div>
    </header>


    <main>
        <h2>Modificar mis datos personales</h2>
        <form id="formModificarDatos">

            <input type="hidden" name="id_pacientes" id="id_pacientes">

            <label for="curp">CURP:</label>
            <input type="text" name="curp" id="curp" pattern="^[A-Z]{4}\d{6}[HM][A-Z]{5}[A-Z0-9]\d$" maxlength="18"
                required><br><br>

            <label for="nombre">Nombre(s):</label>
            <input type="text" name="nombre" id="nombre" pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñ\s]{2,50}$" required><br><br>

            <label for="app">Apellido Paterno:</label>
            <input type="text" name="app" id="app" pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñ\s]{2,50}$" required><br><br>

            <label for="apm">Apellido Materno:</label>
            <input type="text" name="apm" id="apm" pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñ\s]{2,50}$" required><br><br>

            <label>Sexo:</label>
            <div class="contenedor-sexo">
                <input type="radio" name="sexo" id="sexoH" value="H" required>
                <label for="sexoH">Hombre</label>

                <input type="radio" name="sexo" id="sexoM" value="M" required>
                <label for="sexoM">Mujer</label>
            </div><br>

            <label for="fecha_nac">Fecha de Nacimiento:</label>
            <input type="date" name="fecha_nac" id="fecha_nac" required><br><br>

            <label for="correo">Correo electrónico:</label>
            <input type="email" name="correo" id="correo" pattern="^[a-zA-Z0-9._%+\-]+@[a-zA-Z0-9.\-]+\.[a-z]{2,}$"
                required><br><br>

            <label for="usuario">Nombre de Usuario:</label>
            <input type="text" name="usuario" id="usuario" pattern="^[a-zA-Z0-9_]{4,20}$"
                title="Mínimo 4 caracteres, letras, números o guiones bajos." required><br><br>

            <label id="mensajeModificar" style="display:none; margin-bottom:10px; font-weight: bold;"></label>

            <div class="contenedor-acciones">
                <button type="button" onclick="window.location.href='usuarioPrincipal.html'">Cancelar</button>
                <button type="reset">Limpiar formulario</button>
                <button type="submit" id="btnActualizar">Guardar Cambios</button>
            </div>

        </form>
    </main>

    <script src="../js/usuarioDatosEdit.js"></script>
