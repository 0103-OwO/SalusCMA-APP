<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/stylePrincipal.css">
    <link rel="stylesheet" href="../css/styleForms.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">

    <title>Contáctanos - Salus CMA</title>
</head>

<body>

    <header>
        <img src="../img/logo.png" alt="Logotipo principal de la empresa" id="logo" />
        <div class="centro">
            <nav>
                <h1>Salus CMA</h1>
                <ul>
                    <li><a href="../index.html">Inicio</a></li>
                    <li><a href="vision.html">Visión y Misión</a></li>
                    <li><a href="personal.html">Personal</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                    <li><a href="mapaPrincipal.html">Mapa de sitio</a></li>
                </ul>
            </nav>
        </div>
        <div class="perfil-container" id="perfil-dinamico">
            <a href="loginn.html">
                <img id="perfil" src="" alt="Perfil">
                <p>Cargando...</p>
            </a>
        </div>
    </header>


    <main class="mainUnaColumna">
        <h2>Contáctanos</h2>

        <form id="formContacto">

            <label for="nombre">Nombre completo:</label>
            <input type="text" id="nombre" name="nombre" maxlength="100" required title="Ingrese su nombre completo"
                placeholder="Ej. Juan Pérez García"><br><br>

            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono" pattern="^(\+52\s?)?\d{10}$"
                title="Ingrese un teléfono válido, 10 dígitos, con opción a +52" placeholder="Ej. 7821234567" required>

            <label for="correo">Correo electrónico:</label>
            <input type="email" id="correo" name="correo" pattern="^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[a-z]{2,}$"
                title="Ingrese un correo válido" placeholder="Ej. juan@correo.com" required><br><br>

            <label for="mensaje">Mensaje:</label>
            <textarea id="mensaje" name="mensaje" rows="8" maxlength="1000" required
                placeholder="Escriba su mensaje o preguntas"></textarea><br><br>

            <label id="mensajeContacto" style="color: black; display: block; margin-bottom: 10px;"></label>

            <button type="button" onclick="window.location.href='index.html'">Cancelar</button>
            <button type="reset">Limpiar</button>
            <button type="submit">Enviar</button>

        </form>
    </main>

    <script src="../js/global.js"></script>
    <script src="../js/Check.js"></script>
    <footer>
        <div class="footer-container">
            <div class="footer-section contact" id="footer-contacto">
                <h3>Contacto</h3>
                <p>Dirección: <span id="info-direccion">Cargando...</span></p>
                <p>Teléfono: <span id="info-tel">Cargando...</span></p>
                <p>Email: <span id="info-email">Cargando...</span></p>
            </div>
            <div class="footer-section links" id="footer-redes">
                <h3>Enlaces</h3>
                <a href="" id="link-fb"><img src="" alt="Facebook" width="30" height="30" id="icon-fb"></a>
                <a href="" id="link-ig"><img src="" alt="Instagram" width="30" height="30" id="icon-ig"></a>
                <a href="" id="link-x"><img src="" alt="X" width="30" height="30" id="icon-x"></a>
            </div>
            <div id="footer-mapa-container">
            </div>
        </div>
    </footer>

</body>

</html>
