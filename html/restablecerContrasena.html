        </a>
    </div>
</header>


<main class="mainUnaColumna">
    <h2>Cambio de Contraseña</h2>
    <form id="formRestablecer" method="POST">

        <input type="hidden" name="token" id="token" value="">

        <label>Contraseña Nueva:</label>
        <input type="password" name="conNueva" id="conNueva" minlength="8"
            pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d@$!%*#?&]{8,}$"
            title="Debe tener al menos 8 caracteres, incluyendo una letra y un número."
            required><br><br>

        <label>Confirmación de contraseña:</label>
        <input type="password" name="conConfirmacion" id="conConfirmacion"
            title="Repite la nueva contraseña."
            required><br><br>

        <label id="mensajeRestablecer" style="color:red; display:block; margin-bottom:10px;"></label>

        <button type="submit">Confirmar</button>

    </form>

    <script>
       const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        if (!token) {
            alert('Token no válido o expirado.');
            window.location.href = 'recuperarContrasena.html';
        } else {
            document.getElementById('token').value = token;
        }
    </script>
</main>
