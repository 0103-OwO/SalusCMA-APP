<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/stylePrincipal.css">
    <title>Salus CMA</title>
    <link rel="stylesheet" href="css/styleCarrusel.css">
    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">

</head>

<body>

    <header>
        <img src="" alt="Logotipo principal de la empresa" id="logo" />
        <div class="centro">
            <nav>
                <h1>Salus CMA</h1>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="html/vision.html">Visión y Misión</a></li>
                    <li><a href="html/personal.html">Personal</a></li>
                    <li><a href="html/contacto.html">Contacto</a></li>
                    <li><a href="html/mapaPrincipal.html">Mapa de sitio</a></li>
                </ul>
            </nav>
        </div>
        <div class="perfil-container" id="perfil-dinamico">
            <a href="loginn.html">
                <img id="perfil" src="https://res.cloudinary.com/dqnncunbj/image/upload/v1773847782/perfil_ylrrpf.png" alt="Perfil">
                <p>Cargando...</p>
            </a>
        </div>
    </header>
    <main>
        <h2>Bienvenido a Salus CMA</h2>

        <section id="carrusel" aria-label="Carrusel de noticias">
            <button class="carrusel-btn" id="carrusel-prev" aria-label="Anterior">&#10094;</button>
            <button class="carrusel-btn" id="carrusel-next" aria-label="Siguiente">&#10095;</button>

            <div id="carrusel-track">
                <div class="carrusel-slide" data-index="0">
                    <img src="" alt="Nuevos servicios disponibles">
                </div>
                <div class="carrusel-slide" data-index="1">
                    <img src="" alt="Horario extendido">

                </div>
                <div class="carrusel-slide" data-index="2">
                    <img src="" alt="Campaña de vacunación">
                </div>
            </div>

            <div id="carrusel-dots">
                <button class="carrusel-dot activo" data-dot="0"></button>
                <button class="carrusel-dot" data-dot="1"></button>
                <button class="carrusel-dot" data-dot="2"></button>
            </div>
        </section>
    </main>
    <script src="js/global.js"></script>
    <script src="js/mvvh.js"></script>
    <script src="js/Check.js"></script>
    <footer>
        <div class="footer-container">
            <div class="footer-section contact" id="footer-contacto">
                <h3>Contacto</h3>
                <p>Dirección: <span id="info-direccion">Cargando...</span></p>
                <p>Teléfono: <span id="info-tel">Cargando...</span></p>
                <p>Email: <span id="info-email">Cargando...</span></p>
            </div>
            <div class="footer-section links" id="footer-redes">
                <h3>Enlaces</h3>
                <a href="" id="link-fb"><img src="" alt="Facebook" width="30" height="30" id="icon-fb"></a>
                <a href="" id="link-ig"><img src="" alt="Instagram" width="30" height="30" id="icon-ig"></a>
                <a href="" id="link-x"><img src="" alt="X" width="30" height="30" id="icon-x"></a>
            </div>
            <div id="footer-mapa-container">
            </div>
        </div>
    </footer>

    <script src="js/carrusel.js"></script>

</body>

</html>
